# Gemma 4 26B-A4B — MoE (26B total, 3.8B active), 256K context
# Works with Ollama or llama-server
#
# Ollama:
#   ollama pull gemma4:26b
#   ollama serve
#
# llama-server:
#   llama-server -m gemma-4-26B-A4B-it-Q4_K_M.gguf \
#     --port 8090 -ngl 99 --ctx-size 8192 --flash-attn on
#
transports = ["cli"]
tool_packages = ["tools/filesystem", "tools/system"]

[agent]
system_prompt = "You are a helpful assistant. Use tools when asked."
template = "gemma4"
max_tokens = 4096
temperature = 0.7
# 26B handles parallel tool calls well
parallel_tools = true

[backend]
type = "ollama"
endpoint = "http://localhost:11434"
model = "gemma4:26b"

[cache]
max_context = 8192

[transport.cli]
prompt = "you> "
